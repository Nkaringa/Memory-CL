# ============================================================================
# Memory-CL — production compose stack (Phase 10 hardened)
# ----------------------------------------------------------------------------
# Brings up the full read-only-from-the-internet shape:
#
#     ui ──▶ api ──▶ postgres + neo4j + qdrant + redis
#              ─▶ audit JSONL sink (host volume)
#
# One command:
#     docker compose -f docker-compose.production.yml up -d
#
# Requires real values for the secrets in .env.production. The
# `${VAR:?required}` guards below fail the `up` loudly if anything is
# missing instead of starting a half-configured stack.
# ============================================================================

services:

  # --- API ----------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: memory-cl:prod
    container_name: memory-cl-api
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
      OTEL_ENABLED: "true"
      STRICT_BOOTSTRAP: "true"
      POSTGRES_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?required}@postgres:5432/memory
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?required}
      REDIS_URL: redis://redis:6379/0
      MCP_API_KEY: ${MCP_API_KEY:?required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: memory-cl-api
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount a host directory where target codebases live. The
      # ingestion pipeline walks `repo_path` from inside the api
      # container — without this mount it has nothing to walk.
      #
      # Drop repos on the VM at /home/memcl/repos/<name>, then ingest
      # with `memcl ingest /repos/<name> --repo-id <name>`. Read-only
      # so the api can never accidentally mutate source.
      - ${MEMCL_REPOS_HOST_DIR:-/home/memcl/repos}:/repos:ro
    depends_on:
      postgres: { condition: service_healthy }
      qdrant:   { condition: service_started }
      neo4j:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=4).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    # NOTE on scaling: a `deploy: replicas: N` block was REMOVED here.
    # Compose refuses `replicas: N` together with a fixed `container_name`,
    # and the `ports: 8000:8000` mapping below would collide between
    # replicas on the same host anyway. For Swarm / Kubernetes deploys
    # where replicas truly help, remove `container_name` and `ports`,
    # then use a `deploy:` block with the desired replicas + update
    # strategy. On a single-host homelab the `restart: unless-stopped`
    # policy above is already the right reliability mechanism.

  # --- UI -----------------------------------------------------------------
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.production
    image: memory-cl-ui:prod
    container_name: memory-cl-ui
    environment:
      NODE_ENV: production
      MEMORY_CL_BACKEND_URL: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
      # Server-side only: ui/middleware.ts injects this as the
      # `X-API-Key` header on every /api/* request before the rewrite
      # proxies it to the api container. The browser never sees the
      # value — it stays inside the Next.js server.
      MCP_API_KEY: ${MCP_API_KEY:?required}
    ports:
      - "3000:3000"
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # --- Worker -------------------------------------------------------------
  # Same image, different command. Phase 7 workers consume from the
  # queue; here we just sleep — the worker shape is provisioned, the
  # orchestrator script is the operator extension point.
  worker:
    image: memory-cl:prod
    container_name: memory-cl-worker
    env_file: [.env.production]
    environment:
      ENVIRONMENT: production
      ROLE: worker
      POSTGRES_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?required}@postgres:5432/memory
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?required}
      REDIS_URL: redis://redis:6379/0
      MCP_API_KEY: ${MCP_API_KEY:?required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      api: { condition: service_healthy }
    command: ["sleep", "infinity"]
    # The worker reuses the api image, which carries a HEALTHCHECK that
    # curls http://localhost:8000/health/live. The worker process here
    # is `sleep infinity` — there's no API listening inside it, so the
    # inherited healthcheck always fails and docker reports it as
    # unhealthy even though it's doing exactly what it should. Disable
    # the inherited probe so the container's status reflects reality.
    healthcheck:
      disable: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # --- Storage ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: memory-cl-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: memory
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memory"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: memory-cl-qdrant-prod
    # RocksDB opens many segment files per collection; the container
    # default nofile limit exhausts at ~4 collections ("Too many open
    # files" on create_collection). Qdrant ops guidance: raise it.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - qdrant-prod-data:/qdrant/storage
    # NOTE: Qdrant ships a busybox-based slim image that lacks `curl`,
    # `wget`, and `/dev/tcp` shell features — there's no clean
    # in-container HTTP probe. The api uses
    # `depends_on: qdrant: condition: service_started` (not
    # `service_healthy`), so a healthcheck here doesn't gate anything.
    # /health/ready directly pings qdrant from the api side, which is
    # the authoritative readiness signal. Disable the docker-level
    # healthcheck so `docker ps` doesn't falsely report unhealthy.
    healthcheck:
      disable: true
    restart: unless-stopped

  neo4j:
    image: neo4j:5.22-community
    container_name: memory-cl-neo4j-prod
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?required}
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j-prod-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: memory-cl-redis-prod
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-prod-data:
  qdrant-prod-data:
  neo4j-prod-data:
  redis-prod-data:
